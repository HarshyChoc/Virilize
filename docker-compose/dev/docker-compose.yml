name: lobehub
services:
  network-service:
    image: alpine
    container_name: lobe-network
    restart: always
    ports:
      - '${RUSTFS_PORT}:9000' # RustFS API
      - '9001:9001' # RustFS Console
      - '${LOBE_PORT}:3210' # LobeChat
    command: tail -f /dev/null
    networks:
      - lobe-network
    env_file:
      - .env

  postgresql:
    image: paradedb/paradedb:latest-pg17
    container_name: lobe-postgres
    ports:
      - '5432:5432'
    volumes:
      - './data:/var/lib/postgresql/data'
    environment:
      - 'POSTGRES_DB=${LOBE_DB_NAME}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - lobe-network
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    container_name: lobe-redis
    ports:
      - '6379:6379'
    command: redis-server --save 60 1000 --appendonly yes
    volumes:
      - 'redis_data:/data'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - lobe-network

  rustfs:
    image: rustfs/rustfs:latest
    container_name: lobe-rustfs
    network_mode: 'service:network-service'
    environment:
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}
    volumes:
      - rustfs-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9000/health >/dev/null 2>&1 || exit 1']
      interval: 5s
      timeout: 3s
      retries: 30
    command: ['--access-key','${RUSTFS_ACCESS_KEY}','--secret-key','${RUSTFS_SECRET_KEY}','/data']
    env_file:
      - .env

  rustfs-init:
    image: minio/mc:latest
    container_name: lobe-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    volumes:
      - ./bucket.config.json:/bucket.config.json:ro
    entrypoint: /bin/sh
    command: -c '
        set -eux;
        echo "S3_ACCESS_KEY=${RUSTFS_ACCESS_KEY}, S3_SECRET_KEY=${RUSTFS_SECRET_KEY}";
        mc --version;
        mc alias set rustfs "http://network-service:9000" "${RUSTFS_ACCESS_KEY}" "${RUSTFS_SECRET_KEY}";
        mc ls rustfs || true;
        mc mb "rustfs/lobe" --ignore-existing;
        mc admin info rustfs || true;
        mc anonymous set-json "/bucket.config.json" "rustfs/lobe";
      '
    restart: 'no'
    networks:
      - lobe-network
    env_file:
      - .env

  searxng:
    image: searxng/searxng
    container_name: lobe-searxng
    ports:
      - '8180:8080'
    volumes:
      - './searxng-settings.yml:/etc/searxng/settings.yml'
    environment:
      - 'SEARXNG_SETTINGS_FILE=/etc/searxng/settings.yml'
    restart: always
    networks:
      - lobe-network

  google-connector-gmail:
    build:
      context: ../../../VirilizeConnectors/mcp_servers/gmail
    container_name: lobe-google-connector-gmail
    ports:
      - '5010:5000'
    environment:
      - PORT=5000
    restart: always
    networks:
      - lobe-network

  google-connector-drive:
    build:
      context: ../../../VirilizeConnectors/mcp_servers/google_drive
    container_name: lobe-google-connector-drive
    ports:
      - '5001:5001'
    environment:
      - PORT=5001
    restart: always
    networks:
      - lobe-network

  google-connector-calendar:
    build:
      context: ../../../VirilizeConnectors/mcp_servers/google_calendar
    container_name: lobe-google-connector-calendar
    ports:
      - '5002:5002'
    environment:
      - PORT=5002
    restart: always
    networks:
      - lobe-network

  google-connector-docs:
    build:
      context: ../../../VirilizeConnectors/mcp_servers/google_docs
    container_name: lobe-google-connector-docs
    ports:
      - '5004:5004'
    environment:
      - PORT=5004
    restart: always
    networks:
      - lobe-network

  google-connector-sheets:
    build:
      context: ../../../VirilizeConnectors/mcp_servers/google_sheets
    container_name: lobe-google-connector-sheets
    ports:
      - '5005:5005'
    environment:
      - PORT=5005
    restart: always
    networks:
      - lobe-network

  google-connector-slides:
    build:
      context: ../../../VirilizeConnectors/mcp_servers/google_slides
    container_name: lobe-google-connector-slides
    ports:
      - '5006:5006'
    environment:
      - PORT=5006
    restart: always
    networks:
      - lobe-network

  google-connector-youtube:
    build:
      context: ../../../VirilizeConnectors/mcp_servers/youtube
    container_name: lobe-google-connector-youtube
    ports:
      - '5003:5003'
    environment:
      - PORT=5003
    restart: always
    networks:
      - lobe-network

volumes:
  data:
    driver: local
  redis_data:
    driver: local
  rustfs-data:
    driver: local

networks:
  lobe-network:
    driver: bridge
